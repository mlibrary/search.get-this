name: Build latest from main and AutoDeploy to Testing

on:
  workflow_run:
    workflows: [ 'Run Tests' ]
    branches: [ 'main' ]
    types: [ completed ]

jobs:
  build-unstable:
    name: Build unstable ${{ github.sha }}
    uses: mlibrary/platform-engineering-workflows/.github/workflows/build-unstable.yml@3da26f1832553b70524d212b48ec21b0d206006e # v1.6.6
    with:
      image_name: ${{ vars.IMAGE_NAME }}
      tag: ${{ github.sha }}
      dockerfile: Dockerfile
    secrets: inherit

  deploy-testing:
    needs: build-unstable
    name: Deploy to testing
    uses: mlibrary/platform-engineering-workflows/.github/workflows/deploy.yml@3da26f1832553b70524d212b48ec21b0d206006e # v1.6.6
    with:
      image: ${{ needs.build-unstable.outputs.image }}
      file: environments/get-this/workshop/web-image.txt
      CONFIG_REPO_RW_APP_ID: ${{ vars.CONFIG_REPO_RW_APP_ID }}
      CONFIG_REPO_RW_INSTALL_ID: ${{ vars.CONFIG_REPO_RW_INSTALL_ID }}
      CONFIG_REPO_FULL_NAME: ${{ vars.CONFIG_REPO_FULL_NAME }}
    secrets: inherit
